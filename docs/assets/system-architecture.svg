<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">ClearLane MCP system architecture</title>
  <desc id="desc">A flow diagram showing an analyst question moving through an MCP client, setup check, ClearLane audit pipeline, data sources, scoring, outputs, and an append-only audit rail.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb" />
    </marker>
    <linearGradient id="header" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px Arial, Helvetica, sans-serif; fill: #475569; }
      .lane { fill: #ffffff; stroke: #dbe3ef; stroke-width: 1.2; }
      .lane-title { font: 700 13px Arial, Helvetica, sans-serif; fill: #334155; letter-spacing: .04em; }
      .box { fill: #ffffff; stroke: #9fb3c8; stroke-width: 1.4; }
      .box-strong { fill: #ecfeff; stroke: #0f766e; stroke-width: 1.7; }
      .box-data { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; }
      .box-output { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; }
      .box-audit { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
      .label { font: 700 14px Arial, Helvetica, sans-serif; fill: #111827; }
      .small { font: 400 12px Arial, Helvetica, sans-serif; fill: #475569; }
      .tiny { font: 400 11px Arial, Helvetica, sans-serif; fill: #64748b; }
      .arrow { stroke: #2563eb; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #94a3b8; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .pill { fill: url(#header); }
      .pill-text { font: 700 12px Arial, Helvetica, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="1180" height="760" rx="0" />
  <text class="title" x="40" y="50">ClearLane MCP System Architecture</text>
  <text class="subtitle" x="40" y="77">Natural-language transit questions become live-data investigations, shareable reports, and append-only JSON audit logs.</text>

  <rect class="lane" x="35" y="105" width="210" height="580" rx="12" />
  <text class="lane-title" x="55" y="132">USER + AI CLIENT</text>

  <rect class="lane" x="275" y="105" width="265" height="580" rx="12" />
  <text class="lane-title" x="295" y="132">SECURE SETUP + MCP TOOLS</text>

  <rect class="lane" x="570" y="105" width="290" height="580" rx="12" />
  <text class="lane-title" x="590" y="132">LIVE / MOCK DATA SOURCES</text>

  <rect class="lane" x="890" y="105" width="255" height="580" rx="12" />
  <text class="lane-title" x="910" y="132">REPORTS + AUDIT RAIL</text>

  <rect class="box-strong" x="62" y="175" width="156" height="82" rx="8" />
  <text class="label" x="86" y="204">Analyst asks</text>
  <text class="small" x="82" y="225">natural-language</text>
  <text class="small" x="108" y="244">question</text>

  <rect class="box" x="62" y="330" width="156" height="92" rx="8" />
  <text class="label" x="91" y="358">Cursor</text>
  <text class="label" x="91" y="377">Codex</text>
  <text class="label" x="85" y="396">OpenCode</text>

  <rect class="box" x="305" y="160" width="205" height="78" rx="8" />
  <text class="label" x="338" y="190">get_setup_status</text>
  <text class="small" x="335" y="211">no secrets in chat</text>

  <rect class="box-audit" x="305" y="278" width="205" height="78" rx="8" />
  <text class="label" x="348" y="307">clearlane</text>
  <text class="label" x="343" y="326">configure</text>
  <text class="small" x="339" y="344">local credential setup</text>

  <rect class="box-strong" x="305" y="415" width="205" height="82" rx="8" />
  <text class="label" x="331" y="444">answer_question</text>
  <text class="small" x="336" y="466">or CLI: clearlane ask</text>

  <rect class="box-strong" x="305" y="550" width="205" height="78" rx="8" />
  <text class="label" x="344" y="579">audit pipeline</text>
  <text class="small" x="344" y="601">agents + scoring</text>

  <rect class="box-data" x="608" y="148" width="214" height="70" rx="8" />
  <text class="label" x="648" y="176">MTA Open Data</text>
  <text class="small" x="656" y="198">segment speeds</text>

  <rect class="box-data" x="608" y="246" width="214" height="70" rx="8" />
  <text class="label" x="653" y="274">MTA Bus Time</text>
  <text class="small" x="664" y="296">live vehicles</text>

  <rect class="box-data" x="608" y="344" width="214" height="70" rx="8" />
  <text class="label" x="637" y="372">NYC Open Data</text>
  <text class="small" x="648" y="394">311 complaints</text>

  <rect class="box-data" x="608" y="442" width="214" height="70" rx="8" />
  <text class="label" x="637" y="470">NYC Open Data</text>
  <text class="small" x="665" y="492">bus lanes</text>

  <rect class="box-data" x="608" y="540" width="214" height="70" rx="8" />
  <text class="label" x="651" y="568">Optional vision</text>
  <text class="small" x="640" y="590">image/video evidence</text>

  <rect class="box-output" x="925" y="185" width="185" height="86" rx="8" />
  <text class="label" x="958" y="214">Scored findings</text>
  <text class="small" x="951" y="236">bottlenecks, causes,</text>
  <text class="small" x="953" y="254">recommendations</text>

  <rect class="box-output" x="925" y="345" width="185" height="95" rx="8" />
  <text class="label" x="953" y="374">Shareable files</text>
  <text class="small" x="952" y="397">Markdown, PDF, JSON,</text>
  <text class="small" x="974" y="416">GeoJSON</text>

  <rect class="box-audit" x="925" y="518" width="185" height="95" rx="8" />
  <text class="label" x="965" y="547">Audit rail</text>
  <text class="small" x="949" y="570">audit-log.ndjson</text>
  <text class="small" x="947" y="589">audit-manifest.json</text>

  <path class="arrow" d="M140 257 L140 320" />
  <path class="arrow" d="M218 376 L300 205" />
  <path class="arrow" d="M408 238 L408 270" />
  <path class="arrow" d="M408 356 L408 407" />
  <path class="arrow" d="M408 497 L408 540" />
  <path class="arrow" d="M510 589 C545 589 555 183 600 183" />
  <path class="arrow-soft" d="M510 589 C548 589 556 281 600 281" />
  <path class="arrow-soft" d="M510 589 C555 589 560 379 600 379" />
  <path class="arrow-soft" d="M510 589 C560 589 564 477 600 477" />
  <path class="arrow-soft" d="M510 589 C565 589 568 575 600 575" />
  <path class="arrow" d="M822 183 C875 183 875 228 918 228" />
  <path class="arrow-soft" d="M822 281 C875 281 875 228 918 228" />
  <path class="arrow-soft" d="M822 379 C875 379 875 228 918 228" />
  <path class="arrow-soft" d="M822 477 C875 477 875 228 918 228" />
  <path class="arrow-soft" d="M822 575 C875 575 875 228 918 228" />
  <path class="arrow" d="M1018 271 L1018 337" />
  <path class="arrow" d="M1018 440 L1018 510" />

  <rect class="pill" x="328" y="250" width="160" height="23" rx="11.5" />
  <text class="pill-text" x="344" y="266">missing keys path</text>
  <rect class="pill" x="317" y="385" width="182" height="23" rx="11.5" />
  <text class="pill-text" x="334" y="401">configured or mock path</text>

  <text class="tiny" x="48" y="720">ClearLane never requests API keys in MCP chat. Secrets stay in environment variables or local credential storage, and every claim is traceable through JSON audit events.</text>
</svg>
